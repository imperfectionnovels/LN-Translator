name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # windows-latest matches the target platform (the EXE ships for Windows)
    # and the environment where the suite is verified green; Linux runners hit
    # pywebview / WebView2 / curl_cffi import friction that does not reflect
    # how the app actually runs.
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Ruff (lint + import order)
        run: python -m ruff check .
      - name: Em-dash guard (prompts)
        run: python scripts/check_em_dashes.py backend/prompts
      - name: Pytest
        run: python -m pytest backend/tests
